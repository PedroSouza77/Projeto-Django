<!DOCTYPE html>
<html lang="pt_BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Painel de Ações</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
                90deg,
                #041c26,
                #23495a
            );

        }

        .card{

            width:400px;

            background:#ececec;

            padding:30px 22px;

            border-radius:18px;

            box-shadow:
            0px
            10px
            25px
            rgba(
                0,
                0,
                0,
                .35
            );

        }

        h1{

            text-align:center;

            font-size:28px;

            margin-bottom:28px;

            font-weight:bold;

        }

        .btn{

            width:100%;

            height:46px;

            display:flex;

            justify-content:center;

            align-items:center;

            gap:12px;

            margin-bottom:12px;

            text-decoration:none;

            border-radius:4px;

            font-size:16px;

            transition:.3s;

        }

        .btn:hover{

            transform:scale(
                1.02
            );

        }

        .create{

            background:#0d6efd;

            color:white;

        }

        .list{

            background:#6c757d;

            color:white;

        }

        .edit{

            background:#ffc107;

            color:rgb(255, 250, 250);

        }

        .delete{

            background:#dc3545;

            color:white;

        }

        .logout{

            background:white;

            color:black;

            border:1px solid black;

            margin-top:20px;

        }

    </style>

</head>

<body>

    <div class="card">

        <h1>

            Painel de Ações

        </h1>

        <a
            class="btn create"
            href="{% url 'create' %}"
        >

            <i class="bi bi-plus-lg"></i>

            Cadastrar

        </a>

        <a
            class="btn list"
            href="{% url 'list' %}"
        >

            <i class="bi bi-list-ul"></i>

            Listar

        </a>

        <a
            class="btn edit"
            href="{% url 'edit' %}"
        >

            <i class="bi bi-pencil-square"></i>

            Editar

        </a>

        <a
            class="btn delete"
            href="{% url 'delete_list' %}"
        >

            <i class="bi bi-trash"></i>

            Excluir

        </a>

        <a
            class="btn logout"
            href="{% url 'logout' %}"
        >

            <i class="bi bi-box-arrow-right"></i>

            Logout

        </a>

    </div>

</body>

</html>
