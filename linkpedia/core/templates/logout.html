<!DOCTYPE html>
<html lang="pt_BR">

<head>

    <meta charset="utf-8">

    <meta
        http-equiv="X-UA-Compatible"
        content="IE=edge"
    >

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, shrink-to-fit=no"
    >

    <title>

        Logout

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Font Awesome -->

    <link
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        rel="stylesheet"
    >

    <style>

        *{

            margin:0;

            padding:0;

            box-sizing:border-box;

        }

        body{

            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #0f2027,
                #203a43,
                #2c5364
            );

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .container{

            width:100%;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .card{

            width:100%;

            max-width:700px;

            border:none;

            border-radius:1rem;

            box-shadow:
            0 .5rem 1rem
            rgba(
                0,
                0,
                0,
                .3
            );

            text-align:center;

            padding:2rem;

        }

        .logout-card{

            width:100%;

            display:flex;

            flex-direction:column;

            align-items:center;

            justify-content:center;

        }

        .logout-icon{

            font-size:3rem;

            color:#198754;

            margin-bottom:15px;

        }

        .btn-back{

            width:100%;

            margin-top:20px;

        }

    </style>

</head>

<body>

<div class="container">

    <div class="card bg-light text-dark">

        <div class="logout-card">

            <i
                class="
                fas
                fa-sign-out-alt
                logout-icon
                "
            >

            </i>

            <h2>

                Logout realizado

            </h2>

            <p class="text-muted">

                Você saiu do sistema LinkPedia

            </p>

            <a
                href="{% url 'login' %}"

                class="
                btn
                btn-success
                btn-back
                "
            >

                <i class="fas fa-arrow-left me-2"></i>

                Voltar para o Login

            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
