<!DOCTYPE html>
<html>

<head>

<title>Listar</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

</head>

<body
style="
background:
linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);
min-height:100vh;
padding:40px;
"
>

<div class="container">

<div class="card p-4">

<h2 class="mb-4">

Links cadastrados

</h2>

{% for link in links %}

<div class="border rounded p-3 mb-3">

<h5>

{{ link.titulo }}

</h5>

<p>

<a
href="{{ link.link }}"
target="_blank"
class="text-primary"
>

{{ link.link }}

</a>

</p>

<p>

{{ link.observacao }}

</p>

</div>

{% endfor %}

<a
href="{% url 'home' %}"

class="
btn
btn-secondary
w-100
mt-3
"
>

Voltar

</a>

</div>

</div>

</body>

</html>
