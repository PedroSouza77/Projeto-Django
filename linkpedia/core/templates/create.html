<!DOCTYPE html>
<html lang="pt_BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>

Cadastrar Link

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);

}

.container{

width:100%;

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:100%;

max-width:700px;

border:none;

border-radius:1rem;

padding:2rem;

box-shadow:
0 .5rem 1rem
rgba(
0,
0,
0,
0.3
);

}

.form-container{

width:100%;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

form{

width:100%;

}

form p{

width:100%;

margin-bottom:18px;

}

input{

width:100%;

}

textarea{

width:100%;

min-height:140px;

resize:none;

padding:12px;

border:

1px solid
#ced4da;

border-radius:.375rem;

}

</style>

</head>

<body>

<div class="container">

<div class="card bg-light">

<div class="form-container">

<h2 class="text-center mb-4">

Cadastrar Link

</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button
type="submit"
class="
btn
btn-primary
w-100
mt-3
"
>

Cadastrar



</button>

<a
href="{% url 'home' %}"

class="
btn
btn-secondary
w-100
mt-3
"
>

Voltar

</a>

</form>

</div>

</div>

</div>

</body>

</html>
