<!DOCTYPE html>
<html>

<head>

<title>Editar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="
background:linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);
min-height:100vh;
padding:40px;
">

<div class="container">

<div class="card p-4">

<h2>

Selecionar Link

</h2>

{% for link in links %}

<div class="border rounded p-3 mb-3">

{{ link.titulo }}

<a
class="btn btn-warning float-end"
href="{% url 'update' link.id %}"
>

Editar



</a>

</div>

{% endfor %}

<a
href="{% url 'home' %}"

class="
btn
btn-secondary
w-100
mt-3
"
>

Voltar

</a>

</div>

</div>

</body>

</html>
